<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panote</title>
    <style>
      :root {
        --bg: #f8f8f8;
        --surface: #ffffff;
        --hover: #f0f0f0;
        --text: #1a1a1a;
        --muted: #888;
        --border: #e0e0e0;
        --input-bg: #fff;
        --accent: #5c67f2;
        --accent-muted: #eef0ff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1b26;
          --surface: #24283b;
          --hover: #2d3149;
          --text: #c0caf5;
          --muted: #565f89;
          --border: #3b4261;
          --input-bg: #1f2335;
          --accent: #7aa2f7;
          --accent-muted: #1f2d5a;
        }
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      button { font-family: inherit; }
      a { color: var(--accent); }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
